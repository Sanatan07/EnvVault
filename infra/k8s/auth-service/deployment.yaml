apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: envvault-production
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/your-org/envvault-auth-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: auth-service-env
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
      terminationGracePeriodSeconds: 30
