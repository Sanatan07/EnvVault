apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: envvault-production
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/your-org/envvault-notification-service:latest
          ports:
            - containerPort: 8005
          envFrom:
            - secretRef:
                name: notification-service-env
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health/
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: envvault-production
  labels:
    app: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ghcr.io/your-org/envvault-notification-service:latest
          command: ["celery", "-A", "config", "worker", "-l", "info", "-c", "4"]
          envFrom:
            - secretRef:
                name: notification-service-env
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: envvault-production
spec:
  selector:
    app: notification-service
  ports:
    - port: 8005
      targetPort: 8005
  type: ClusterIP
